name: Slideshow
options:
  bundleIdPrefix: is.ars
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: X8VJSFQ9QC

packages:
  SlideshowKit:
    path: SlideshowKit

targets:
  Slideshow:
    type: application
    platform: macOS
    sources:
      - path: Slideshow
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.ars.slideshow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Slideshow/Info.plist
        CODE_SIGN_ENTITLEMENTS: Slideshow/Slideshow.entitlements
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - package: SlideshowKit

  SlideshowMobile:
    type: application
    platform: iOS
    sources:
      - path: SlideshowMobile
      - path: Slideshow/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.ars.slideshow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SlideshowMobile/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SlideshowKit

  SlideshowUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SlideshowUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Slideshow

schemes:
  Slideshow:
    build:
      targets:
        Slideshow: all
        SlideshowUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SlideshowUITests

  SlideshowMobile:
    build:
      targets:
        SlideshowMobile: all
    run:
      config: Debug
