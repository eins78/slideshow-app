name: Slideshow
options:
  bundleIdPrefix: is.kte
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SlideshowKit:
    path: SlideshowKit

targets:
  Slideshow:
    type: application
    platform: macOS
    sources:
      - path: Slideshow
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.kte.slideshow
        INFOPLIST_FILE: Slideshow/Info.plist
        CODE_SIGN_ENTITLEMENTS: Slideshow/Slideshow.entitlements
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - package: SlideshowKit

  SlideshowMobile:
    type: application
    platform: iOS
    sources:
      - path: SlideshowMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.kte.slideshow.mobile
        INFOPLIST_FILE: SlideshowMobile/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
    dependencies:
      - package: SlideshowKit

  SlideshowUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SlideshowUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Slideshow

schemes:
  Slideshow:
    build:
      targets:
        Slideshow: all
        SlideshowUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SlideshowUITests
